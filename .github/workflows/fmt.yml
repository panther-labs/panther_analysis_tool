on:
  push:
    branches:
      - main # Splitting out main here ensures we do not redundantly run this workflow on merge from a PR
  pull_request:
    branches:
      - "*" # Match all branches

permissions:
  contents: write
  id-token: write

jobs:
  fmt:
    if: ${{ github.actor != 'panther-bot-automation' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: 3.11
      - name: Setup Virtual Environment
        run: make venv
      - name: Format
        run: make fmt
      - name: Update dependencies
        run: make reqs
      - name: Check for changes
        id: check_changes
        run: |
          git add -A .
          if git diff --cached --quiet; then
            echo "No formatting changes needed"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Formatting changes detected"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git reset  # Unstage so the commit step can handle it
          fi
      - name: Fail if fork PR needs formatting
        if: ${{ steps.check_changes.outputs.has_changes == 'true' && github.event.pull_request.head.repo.fork == true }}
        run: |
          echo "::error::This PR requires formatting changes but was opened from a fork, so auto-formatting cannot be applied. Please run 'make fmt' and 'make reqs' locally and push the changes."
          exit 1
      - name: Import GPG key
        if: ${{ steps.check_changes.outputs.has_changes == 'true' && github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]' }}
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.PANTHER_BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PANTHER_BOT_GPG_PRIVATE_KEY_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
      - name: Commit formatting and any dependency updates
        if: ${{ steps.check_changes.outputs.has_changes == 'true' && github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]' }}
        run: |
          git config --global user.name "panther-bot-automation"
          git config --global user.email "github-service-account-automation@panther.io"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH=${{ github.head_ref }}
            git fetch; git checkout ${{ github.head_ref }}
          else
            BRANCH=${{ github.ref }}
          fi

          git add -A .

          REQUIRES_COMMIT=1
          git commit -S -m "Auto-format files" || REQUIRES_COMMIT=0

          if [[ $REQUIRES_COMMIT -eq 0 ]]; then
            echo "No auto-formatting needed"
          else
            echo "Committing auto-formatted files and any dependency updates"
            git push origin HEAD:$BRANCH
          fi
        env:
          GH_TOKEN: ${{ secrets.PANTHER_BOT_AUTOMATION_TOKEN }}
